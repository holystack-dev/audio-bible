name: Build & deploy firmware installer

# Builds the firmware with ESP-IDF v5.3.2, merges it into a single flashable
# image, and publishes the web installer (docs/ + firmware.bin) to GitHub Pages.
#
# Setup once:  Settings -> Pages -> Source: "GitHub Actions".
# Trigger:     push a tag like  v1.0.0   (or run manually from the Actions tab).

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # attach firmware.bin to the GitHub Release
  pages: write      # deploy to GitHub Pages
  id-token: write   # required by deploy-pages

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build AND merge inside the IDF container so the esptool version that
      # produced flasher_args.json is the one that consumes it.
      - name: Build & merge firmware (ESP-IDF v5.3.2)
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3.2
          target: esp32s3
          path: audio_bible
          command: |
            idf.py build
            cd build
            esptool.py --chip esp32s3 merge_bin -o firmware.bin \
              --flash_mode dio --flash_size 16MB --flash_freq 80m \
              0x0 bootloader/bootloader.bin \
              0x8000 partition_table/partition-table.bin \
              0x20000 audio_bible.bin

      - name: Assemble Pages site
        run: |
          mkdir -p site
          cp -r installer/* site/
          cp audio_bible/build/firmware.bin site/firmware.bin

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Attach firmware to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: audio_bible/build/firmware.bin

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
